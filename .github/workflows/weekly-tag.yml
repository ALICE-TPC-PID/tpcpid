name: Weekly Auto Tag

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * 4"
  workflow_dispatch:
    inputs:
      custom:
        description: "Custom tag name (leave empty for auto)"
        required: false
        default: ""
        type: string

jobs:
  weekly-tag:
    runs-on: ubuntu-latest

    container:
      image: rootproject/root:6.30.06-ubuntu22.04

    steps:
      - name: Install base dependencies
        run: |
          apt-get update
          apt-get install -y git ca-certificates python3-pip
          python3 -m pip install --upgrade pip

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          DATE=$(date -u +'%d%m%Y')
          if [ -z "${{ github.event.inputs.custom }}" ]; then
            TAG="weekly-${DATE}"
          else
            TAG="${{ github.event.inputs.custom }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure git
        working-directory: ${{ github.workspace }}
        run: |
          test -d .git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Recreate tag on current commit
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"

      - name: Check out created tag
        working-directory: ${{ github.workspace }}
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Install Python deps
        run: |
          python3 -m pip install -r requirements.txt

      - name: Run CI test on weekly tag
        run: |
          python3 run/ci/ci_test.py